ni-game (3 pts)\n  { id:13, name:'ชมรมหมากรุก',  icon:'♟️', type:3, pts:3, color:'#6B7A86',\n    desc:'หมากรุกไทยและสากล พัฒนาการคิดเชิงกลยุทธ์ สมาธิ และ IQ' },\n  { id:14, name:'ชมรม E-Sports', icon:'🎮', type:3, pts:3, color:'#4A89AC',\n    desc:'กีฬา E-Sports แข่งขัน ROV, VALORANT, FIFA, Minecraft' },\n  { id:15, name:'ชมรมหุ่นยนต์',  icon:'🤖', type:3, pts:3, color:'#B5852E',\n    desc:'ออกแบบ สร้าง และเขียนโปรแกรมหุ่นยนต์ แข่งขันระดับประเทศ' },\n];\n\n// =========================================================\n//  REWARDS — ของรางวัลที่ใช้แต้มแลก (หักแต้มเมื่อแลก)\n//  🔧 แก้ชื่อ/ราคา/ไอคอน ได้ตามของจริงที่ทีมเตรียมไว้\n//  cost = จำนวนแต้มที่ต้องใช้แลก\n//  stock = จำนวนที่มี (ใส่ null = ไม่จำกัด)\n// =========================================================\nconst REWARDS = [\n  { id:'r1', name:'สติกเกอร์ชมรม',  icon:'🌟', cost:2,  stock:null,\n    desc:'สติกเกอร์ลายชมรมสุดน่ารัก เลือกได้ 1 ใบ' },\n  { id:'r2', name:'ที่คั่นหนังสือ',  icon:'🔖', cost:3,  stock:null,\n    desc:'ที่คั่นหนังสือลายเฉพาะงานเปิดโลกกิจกรรม' },\n  { id:'r3', name:'พวงกุญแจน่ารัก',  icon:'🔑', cost:5,  stock:null,\n    desc:'พวงกุญแจของที่ระลึกประจำงาน' },\n  { id:'r4', name:'กระเป๋าผ้า',       icon:'👜', cost:8,  stock:null,\n    desc:'กระเป๋าผ้าใส่ของ ใช้ได้จริงทุกวัน' },\n  { id:'r5', name:'เสื้อยืดงาน',      icon:'👕', cost:12, stock:null,\n    desc:'เสื้อยืดลิมิเต็ดเอดิชันของงาน (มีจำนวนจำกัด)' },\n  { id:'r6', name:'ลุ้นรางวัลใหญ่',   icon:'🎁', cost:15, stock:null,\n    desc:'แลกสิทธิ์ลุ้นรางวัลใหญ่ประจำงาน!' },\n];\n\n// =========================================================\n//  ข้อมูลชมรม — ลิงก์สมัคร + รูปภาพ (เป้าหมายงาน: แนะนำชมรม)\n//  🔧 เติมลิงก์/รูปของแต่ละชมรมได้ที่นี่ (key = หมายเลขบูธ)\n//     signup : ลิงก์ฟอร์มสมัคร / เพจ / IG ของชมรม (เว้นว่าง = ใช้ SIGNUP_URL_DEFAULT)\n//     img    : ลิงก์รูปภาพชมรม (เว้นว่าง = แสดงไอคอนอีโมจิแทน)\n// =========================================================\n// ถ้าทุกชมรมใช้ฟอร์มสมัครเดียวกัน ใส่ลิงก์รวมตรงนี้ (ไม่งั้นเว้นว่างไว้)\nconst SIGNUP_URL_DEFAULT = '';\n\nconst CLUB_INFO = {\n  1:  { signup:'', img:'' },   // ชมรมดนตรีไทย\n  2:  { signup:'', img:'' },   // ชมรมถ่ายภาพ\n  3:  { signup:'', img:'' },   // ชมรมศิลปะ\n  4:  { signup:'', img:'' },   // ชมรมกีฬา\n  5:  { signup:'', img:'' },   // ชมรมอนุรักษ์สิ่งแวดล้อม\n  6:  { signup:'', img:'' },   // ชมรมภาษาอังกฤษ\n  7:  { signup:'', img:'' },   // ชมรมภาษาญี่ปุ่น\n  8:  { signup:'', img:'' },   // ชมรมภาษาจีน\n  9:  { signup:'', img:'' },   // ชมรมดนตรีสากล\n  10: { signup:'', img:'' },   // ชมรมคอมพิวเตอร์\n  11: { signup:'', img:'' },   // ชมรมเต้น\n  12: { signup:'', img:'' },   // ชมรมละคร\n  13: { signup:'', img:'' },   // ชมรมหมากรุก\n  14: { signup:'', img:'' },   // ชมรม E-Sports\n  15: { signup:'', img:'' },   // ชมรมหุ่นยนต์\n};\nfunction clubInfo(id)   { return CLUB_INFO[id] || {}; }\nfunction clubImg(id)    { return (clubInfo(id).img || '').trim(); }\nfunction clubSignup(id) { return (clubInfo(id).signup || '').trim() || SIGNUP_URL_DEFAULT; }\n\nconst AVATARS = ['🌟','😎','🚀','🎯','⚡','🌸','🦋','🌈','🎭','🔥','🐉','🎪'];\n\nconst GAME_EMOJIS = ['🌟','🎯','🏆','🎪','🎡','🎢','🎨','🎭'];\n\n// =========================================================\n//  PERSISTENCE — localStorage\n// =========================================================\nfunction loadState() {\n  try {\n    const u = localStorage.getItem('qrhunt-user');\n    if (u) S.user = JSON.parse(u);\n    const d = localStorage.getItem('qrhunt-done');\n    if (d) S.done = new Set(JSON.parse(d));\n    const p = localStorage.getItem('qrhunt-pts');\n    if (p) S.pts = parseInt(p) || 0;\n    const rd = localStorage.getItem('qrhunt-redeemed');\n    if (rd) S.redeemed = parseInt(rd) || 0;\n    const rl = localStorage.getItem('qrhunt-redemptions');\n    if (rl) S.redemptions = JSON.parse(rl) || [];\n  } catch(e) {}\n}\n// บันทึกลงเครื่อง (localStorage) เท่านั้น — ไม่ยุ่งกับแต้มบนเซิร์ฟเวอร์\n// แต้มจริงถูกควบคุมโดย backend ผ่าน action 'visit' / 'redeem'\nfunction saveState() {\n  try {\n    if (S.user) localStorage.setItem('qrhunt-user', JSON.stringify(S.user));\n    localStorage.setItem('qrhunt-done', JSON.stringify([...S.done]));\n    localStorage.setItem('qrhunt-pts', String(S.pts));\n    localStorage.setItem('qrhunt-redeemed', String(S.redeemed));\n    localStorage.setItem('qrhunt-redemptions', JSON.stringify(S.redemptions));\n  } catch(e) {}\n}\nfunction clearState() {\n  try {\n    ['qrhunt-user','qrhunt-done','qrhunt-pts','qrhunt-redeemed','qrhunt-redemptions']\n      .forEach(k => localStorage.removeItem(k));\n  } catch(e) {}\n  Object.assign(S, { user:null, pts:0, done:new Set(), redeemed:0, redemptions:[],\n                     tab:'booths', filter:'all', booth:null, game:null });\n}\n\n// แต้มคงเหลือที่ยังใช้แลกของได้ = แต้มที่ได้รับ − แต้มที่แลกไปแล้ว\nfunction pointsLeft() { return Math.max(0, S.pts - S.redeemed); }\n\n// =========================================================\n//  API — Firebase Firestore backend\n//  (คงรูปแบบ return เดิมทุกฟังก์ชัน — ส่วนอื่นของแอปไม่ต้องแก้)\n// =========================================================\n\n// รหัสแบบเลขล้วน (ใช้เป็นชื่อเอกสารผู้เล่น) เช่น \"693070001-1\" → \"6930700011\"\nfunction _numId(id) { return String(id || '').replace(/\\D/g, ''); }\n\n// แต้มของบูธตามประเภท (ต้องตรงกับกฎใน firestore.rules)\nfunction _boothPts(boothId, correct) {\n  boothId = parseInt(boothId) || 0;\n  if (boothId >= 1  && boothId <= 5)  return 1;\n  if (boothId >= 6  && boothId <= 12) return correct ? 2 : 1;\n  if (boothId >= 13 && boothId <= 15) return 3;\n  return 0;\n}\n\n// อ่าน \"แต้มของจริง\" จากสมุดบันทึก visits + ยอดแลกจาก redemptions\nasync function _readState(numId) {\n  const vs = await db.collection('players').doc(numId).collection('visits').get();\n  const done = {}; let earned = 0;\n  vs.forEach(d => { const b = parseInt(d.id); const p = parseInt(d.data().pts) || 0; done[b] = p; earned += p; });\n  const rs = await db.collection('redemptions').where('pid', '==', numId).get();\n  let redeemed = 0; rs.forEach(d => redeemed += parseInt(d.data().cost) || 0);\n  return { done, earned, redeemed, remaining: Math.max(0, earned - redeemed), visited: Object.keys(done).length };\n}\n\n// เอกสารโปรไฟล์ + ยอดรวม (denormalized) ไว้โชว์ leaderboard/แอดมินเร็ว ๆ\nfunction _profileDoc(st) {\n  return {\n    id: S.user.id, name: S.user.name, av: S.user.av, email: S.user.email || '',\n    status: 'เข้าร่วมแล้ว', earned: st.earned, redeemed: st.redeemed,\n    remaining: st.remaining, visited: st.visited, updatedAt: Date.now(),\n  };\n}\n\n// ลงทะเบียน/อัปเดตโปรไฟล์ตอนล็อกอิน — คืนแต้มจริง เพื่อกู้คืนความคืบหน้า\nfunction apiSaveProfile() {\n  return new Promise(async resolve => {\n    if (!API_URL || !db || !S.user || S.user.isAdmin || S.user.isPreview) { resolve(null); return; }\n    try {\n      const numId = _numId(S.user.id);\n      const ref = db.collection('players').doc(numId);\n      const snap = await ref.get();\n      if (!snap.exists) {\n        await ref.set({ id: S.user.id, name: S.user.name, av: S.user.av, email: S.user.email || '',\n                        status: 'เข้าร่วมแล้ว', earned: 0, redeemed: 0, remaining: 0, visited: 0, updatedAt: Date.now() });\n      }\n      const st = await _readState(numId);\n      await ref.set(_profileDoc(st), { merge: true });\n      resolve({ ok: true, id: S.user.id, ...st });\n    } catch (e) { console.error(e); resolve(null); }\n  });\n}\n\n// บันทึกการเยี่ยมบูธ — กฎ Firestore เป็นผู้ตรวจ token/แต้ม + กันเก็บซ้ำ (visit สร้างครั้งเดียว)\nfunction apiVisit(boothId, correct, token) {\n  return new Promise(async resolve => {\n    if (!API_URL || !db || !S.user || S.user.isAdmin || S.user.isPreview) { resolve({ _local: true }); return; }\n    try {\n      const numId = _numId(S.user.id);\n      const pref  = db.collection('players').doc(numId);\n      const vref  = pref.collection('visits').doc(String(boothId));\n      const b = parseInt(boothId) || 0;\n      let already = false, awarded = 0;\n\n      const vsnap = await vref.get();\n      if (vsnap.exists) {\n        already = true;\n      } else {\n        const data = { booth: b, pts: _boothPts(b, correct), time: Date.now() };\n        if (b >= 6 && b <= 12) data.correct = !!correct;     // บูธตอบคำถาม\n        if (b >= 1 && b <= 5)  data.token   = token || '';   // บูธสแกน (กฎตรวจ token)\n        await vref.set(data);\n        awarded = data.pts;\n      }\n      const st = await _readState(numId);\n      await pref.set(_profileDoc(st), { merge: true });\n      resolve({ ok: true, id: S.user.id, booth: b, awarded, already, ...st });\n    } catch (e) {\n      const denied = e && (e.code === 'permission-denied' || /permission/i.test(e.message || ''));\n      resolve({ error: denied ? 'QR ไม่ถูกต้อง — กรุณาสแกน QR ที่บูธนี้โดยตรง'\n                              : 'บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง' });\n    }\n  });\n}\n\n// แลกของรางวัล — กฎ Firestore ตรวจ PIN (PIN ไม่อยู่ในไฟล์นี้แล้ว) + เช็คแต้มคงเหลือก่อนส่ง\nfunction apiRedeem(reward, pin) {\n  return new Promise(async resolve => {\n    if (!API_URL || !db || !S.user || S.user.isAdmin || S.user.isPreview) { resolve({ _local: true }); return; }\n    try {\n      const numId = _numId(S.user.id);\n      const cost  = parseInt(reward.cost) || 0;\n      if (cost <= 0) { resolve({ error: 'ค่าแลกไม่ถูกต้อง' }); return; }\n\n      const st = await _readState(numId);\n      if (cost > st.remaining) {\n        resolve({ error: 'แต้มคงเหลือไม่พอ (เหลือ ' + st.remaining + ' ต้องใช้ ' + cost + ')', ...st });\n        return;\n      }\n      await db.collection('redemptions').add({\n        pid: numId, id: S.user.id, name: S.user.name || '',\n        reward: reward.name, cost: cost, pin: pin || '', time: Date.now(),\n      });\n      const st2 = await _readState(numId);\n      await db.collection('players').doc(numId)\n        .set({ redeemed: st2.redeemed, remaining: st2.remaining, updatedAt: Date.now() }, { merge: true });\n      resolve({ ok: true, id: S.user.id, reward: reward.name, cost, ...st2 });\n    } catch (e) {\n      const denied = e && (e.code === 'permission-denied' || /permission/i.test(e.message || ''));\n      resolve({ error: denied ? 'รหัสสตาฟไม่ถูกต้อง' : 'บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง' });\n    }\n  });\n}\n\n// ดึงข้อมูลภาพรวม/อันดับ (ใช้ในหน้าแอดมินและหน้าอันดับ)\nfunction apiGet(action, cb) {\n  if (!API_URL || !db) { cb(null); return; }\n  if (action === 'summary')     { _getSummary().then(cb).catch(() => cb(null)); return; }\n  if (action === 'leaderboard') { _getLeaderboard().then(cb).catch(() => cb(null)); return; }\n  cb(null);\n}\n\nasync function _getLeaderboard() {\n  const ps = await db.collection('players').where('status', '==', 'เข้าร่วมแล้ว').get();\n  const list = [];\n  ps.forEach(d => {\n    const x = d.data();\n    list.push({ id: x.id || d.id, name: x.name || '', earned: parseInt(x.earned) || 0,\n                redeemed: parseInt(x.redeemed) || 0, remaining: parseInt(x.remaining) || 0, av: x.av || '🌟' });\n  });\n  list.sort((a, b) => b.earned - a.earned);\n  return list.slice(0, 100);\n}\n\nasync function _getSummary() {\n  const ps = await db.collection('players').get();\n  let joined = 0, totalEarned = 0, totalRedeemed = 0;\n  ps.forEach(d => {\n    const x = d.data();\n    if (x.status === 'เข้าร่วมแล้ว') joined++;\n    totalEarned   += parseInt(x.earned)   || 0;\n    totalRedeemed += parseInt(x.redeemed) || 0;\n  });\n  const rs = await db.collection('redemptions').get();\n  const byReward = {}; let totalRedemptions = 0;\n  rs.forEach(d => { const r = String(d.data().reward || ''); if (r) { byReward[r] = (byReward[r] || 0) + 1; totalRedemptions++; } });\n  return { ok: true, totalStudents: STUDENT_IDS.length, joined, notJoined: STUDENT_IDS.length - joined,\n           totalEarned, totalRedeemed, totalRedemptions, byReward };\n}\n\n// =========================================================\n//  STATE\n// =========================================================\n\nlet S = {\n  user: null,\n  pts: 0,            // แต้มสะสมที่ได้รับทั้งหมด (จากบูธ)\n  redeemed: 0,       // แต้มที่แลกของรางวัลไปแล้ว (รวม)\n  redemptions: [],   // ประวัติการแลก [{id,name,cost,time}]\n  done: new Set(),\n  tab: 'booths',\n  filter: 'all',\n  booth: null,\n  game: null,\n  fromScan: null, // booth id ที่เข้ามาผ่านการสแกน QR จริง (?booth=N)\n  tokens: {},     // เก็บ token ของแต่ละบูธที่ได้จากการสแกน QR (?t=...) เพื่อส่งไปยืนยันกับเซิร์ฟเวอร์\n};\n\n// แต้มของบูธ (ใช้แสดงผลทันที/โหมดพรีวิว) — แต้มจริงยึดค่าจากเซิร์ฟเวอร์เสมอ\nfunction boothPointsLocal(id, correct) {\n  const b = BOOTHS.find(x => x.id === id);\n  if (!b) return 0;\n  if (b.type === 2) return correct ? 2 : 1;\n  return b.pts;\n}\n\nlet _scanner = null; // instance ของ Html5Qrcode ที่กำลังเปิดกล้องอยู่\nlet _cowboyStop = null; // cleanup fn สำหรับ Running Cowboy animation\n\n// =========================================================\n//  RUNNING COWBOY ANIMATION\n//  Pixel-art canvas scene extracted from \"Running Cowboy.html\"\n// =========================================================\nfunction startCowboyAnimation(canvas) {\n  const ctx = canvas.getContext('2d');\n  ctx.imageSmoothingEnabled = false;\n  const L = 12, Hy = 128;\n  let start = performance.now(), raf = null;\n\n  function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, w, h); }\n  function line(x0, y0, x1, y1, w, c) {\n    ctx.fillStyle = c;\n    const dx = x1-x0, dy = y1-y0, n = Math.max(Math.abs(dx), Math.abs(dy)) + 1, o = (w/2)|0;\n    for (let i = 0; i <= n; i++) {\n      const xx = x0+dx*i/n, yy = y0+dy*i/n;\n      ctx.fillRect(Math.round(xx)-o, Math.round(yy)-o, w, w);\n    }\n  }\n  function smooth(x) { x = x<=0?0:x>=1?1:x; return x*x*(3-2*x); }\n  function _hex(c) { return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]; }\n  function lerpC(a, b, t) {\n    const A=_hex(a), B=_hex(b);\n    return 'rgb('+Math.round(A[0]+(B[0]-A[0])*t)+','+Math.round(A[1]+(B[1]-A[1])*t)+','+Math.round(A[2]+(B[2]-A[2])*t)+')';\n  }\n  function gradAt(stops, f) {\n    for (let i = 0; i < stops.length-1; i++) {\n      const s0=stops[i], s1=stops[i+1];\n      if (f>=s0[0] && f<=s1[0]) return lerpC(s0[1], s1[1], (f-s0[0])/(s1[0]-s0[0]));\n    }\n    return stops[stops.length-1][1];\n  }\n\n  function drawSky() {\n    const stops = [[0,'#1c3f5e'],[0.30,'#2b5b7a'],[0.50,'#4f7e98'],[0.66,'#83b1bd'],[0.78,'#bfdfe0'],[0.87,'#f3ead0'],[0.94,'#ffe2b4'],[1,'#ffce93']];\n    for (let y = 0; y < Hy; y++) px(0, y, 384, 1, gradAt(stops, y/Hy));\n  }\n  function drawSun() {\n    const sx=256, sy=96;\n    const glow = [[64,'rgba(255,228,170,0.05)'],[46,'rgba(255,224,150,0.10)'],[32,'rgba(255,222,140,0.18)'],[22,'rgba(255,228,160,0.30)']];\n    for (const [r,c] of glow) { ctx.fillStyle=c; ctx.beginPath(); ctx.arc(sx,sy,r,0,7); ctx.fill(); }\n    ctx.fillStyle='#ffe7a6'; ctx.beginPath(); ctx.arc(sx,sy,15,0,7); ctx.fill();\n    ctx.fillStyle='#ffd87e'; ctx.beginPath(); ctx.arc(sx,sy,15,0.2,Math.PI-0.2); ctx.fill();\n  }\n  function drawSunSlits() {\n    const sx=256, sy=96;\n    for (let i=0;i<4;i++) { const yy=sy+3+i*4, half=16-i*2; px(sx-half,yy,half*2,1,'#cfe2e0'); }\n  }\n  function drawClouds(t) {\n    const spd=4, P=spd*L, off=(spd*t)%P;\n    function drawCloud(bx,by,s) {\n      const c='rgba(255,236,214,'+(0.55*s)+')';\n      px(bx,by,18,4,c); px(bx+4,by-3,12,4,c); px(bx+9,by-5,8,4,c); px(bx-3,by+1,6,3,c);\n    }\n    for (const [wx,wy,s] of [[10,30,1],[30,22,0.8]]) {\n      let x=wx-off; if(x<-30)x+=P;\n      drawCloud(x,wy,s); drawCloud(x+P,wy,s);\n    }\n  }\n  function drawBirds(t) {\n    const ph=2*Math.PI*t/L;\n    ctx.fillStyle='rgba(40,55,70,0.55)';\n    [[70,44],[86,50],[78,38]].forEach((b,i) => {\n      const x=b[0]+Math.sin(ph+i)*6, flap=Math.sin(t*6+i)>0?1:0, y=b[1]+Math.sin(ph*1.5+i)*2;\n      ctx.fillRect(x-2,y+flap,2,1); ctx.fillRect(x,y,1,1); ctx.fillRect(x+1,y+flap,2,1);\n    });\n  }\n  function mtnSurf(world, comps, base, amp) {\n    let s=0; for(const c of comps) s+=c.a*Math.sin(c.f*world+c.ph); return base-amp*s;\n  }\n  function drawMountains(t) {\n    const layers = [\n      {spd:4,base:Hy-4,amp:22,col:'#9fc0c9',hi:'#bcd6da',comps:[{m:1,a:.5,ph:0},{m:2,a:.3,ph:1.7},{m:3,a:.2,ph:3.1}]},\n      {spd:8,base:Hy-1,amp:16,col:'#6f9e8b',hi:'#86b29c',comps:[{m:2,a:.5,ph:.4},{m:3,a:.3,ph:2.1},{m:5,a:.2,ph:4.0}]},\n      {spd:16,base:Hy+1,amp:11,col:'#557f44',hi:'#6b9755',comps:[{m:3,a:.5,ph:1.0},{m:5,a:.3,ph:3.3},{m:8,a:.2,ph:5.2}]}\n    ];\n    for (const Lv of layers) {\n      const P=Lv.spd*L, off=Lv.spd*t;\n      const comps=Lv.comps.map(c=>({a:c.a,ph:c.ph,f:2*Math.PI*c.m/P}));\n      for (let x=0;x<384;x++) {\n        let y=Math.round(mtnSurf(x+off,comps,Lv.base,Lv.amp));\n        if(y<0)y=0; if(y>=Hy)continue;\n        px(x,y,1,Hy-y,Lv.col); px(x,y,1,1,Lv.hi);\n      }\n    }\n  }\n  function drawGround(t) {\n    const H=216;\n    for (const [y0,y1,c] of [[Hy,Hy+6,'#d9c878'],[Hy+6,Hy+22,'#a9bd5f'],[Hy+22,Hy+48,'#7ba24c'],[Hy+48,H,'#5d8038']]) px(0,y0,384,y1-y0,c);\n    for (const [ry,spd,c] of [[Hy+10,22,'#8caf55'],[Hy+26,30,'#6b9442'],[Hy+40,40,'#4f7531']]) {\n      const P=spd*L, off=(spd*t)%P;\n      for (let i=-1;i<14;i++) { let x=i*28-off; x=((x%P)+P)%P; if(x>384)continue; px(x-off%28,ry,10,1,c); }\n    }\n  }\n  function drawGrassTufts(t) {\n    const spd=24, P=spd*L, off=(spd*t)%P;\n    const seed=n=>{const s=Math.sin(n*91.7)*43758.5;return s-Math.floor(s);};\n    for (let i=0,count=Math.ceil(P/14);i<count;i++) {\n      const wx=i*14+seed(i)*8, wy=Hy+30+seed(i+5)*34, c=seed(i+9)>0.5?'#4f7d35':'#6b9748';\n      let x=wx-off; if(x<-8)x+=P; if(x>392)continue;\n      px(x,wy,1,4,c); px(x-2,wy+1,1,3,c); px(x+2,wy+1,1,3,c); px(x-1,wy-1,1,2,c);\n    }\n  }\n  function drawFgGrass(t) {\n    const H=216, spd=40, P=spd*L, off=(spd*t)%P;\n    const seed=n=>{const s=Math.sin(n*57.3)*24634.6;return s-Math.floor(s);};\n    for (let i=0,count=Math.ceil(P/6);i<count;i++) {\n      const wx=i*6+seed(i)*4, hgt=8+seed(i+3)*12, c=seed(i+7)>0.5?'#3c5e28':'#2f4d1f';\n      let x=wx-off; if(x<-4)x+=P; if(x>388)continue;\n      const lean=Math.round(Math.sin(i+t*1.2)*1.5);\n      line(x,H-1,x+lean,H-1-hgt,1,c); line(x+1,H-1,x+1+lean,H-3-hgt,1,c);\n    }\n  }\n  function drawRunner(cxr, footY, t, alpha) {\n    if(alpha<=0.01)return;\n    ctx.globalAlpha=alpha;\n    const P={skin:'#e6b487',hat:'#7a5a36',hatD:'#5c4326',shirt:'#3f6f99',shirtD:'#345b7f',vest:'#b9874a',pants:'#2f4a63',boot:'#3a2a1c',red:'#c0432f'};\n    const ph=t*3*Math.PI, lean=3;\n    const bob=Math.abs(Math.sin(ph))*1.4;\n    const hY=footY-15-bob, sY=footY-25-bob, hdY=footY-33-bob;\n    const hipX=cxr-1, shX=cxr+lean, hdX=cxr+lean+1;\n    for (let side=0;side<2;side++) {\n      const pp=ph+side*Math.PI, hipx=hipX+(side?1:-1);\n      const thA=Math.PI/2+Math.sin(pp)*0.95, kL=7;\n      const kx=hipx+Math.cos(thA)*kL, ky=hY+Math.sin(thA)*kL;\n      const shA=thA+0.45+Math.max(0,Math.cos(pp))*0.85, sL=7;\n      const fx=kx+Math.cos(shA)*sL, fyy=ky+Math.sin(shA)*sL;\n      line(hipx,hY,kx,ky,3,side?P.pants:'#26405a'); line(kx,ky,fx,fyy,3,side?P.pants:'#26405a');\n      px(fx-2,fyy-1,4,3,P.boot);\n    }\n    line(hipX,hY,shX,sY,6,P.shirt); px(shX-3,sY,6,2,P.shirtD); px((hipX+shX)/2-2,(hY+sY)/2,4,hY-sY,P.vest);\n    for (let side=0;side<2;side++) {\n      const pp=ph+side*Math.PI+Math.PI, shx=shX+(side?2:-2), shy=sY+1;\n      const uA=Math.PI/2+Math.sin(pp)*1.0, uL=5, ex=shx+Math.cos(uA)*uL, ey=shy+Math.sin(uA)*uL;\n      const fA=uA-0.7-Math.max(0,Math.sin(pp))*0.5, fL=5, hx=ex+Math.cos(fA)*fL, hy=ey+Math.sin(fA)*fL;\n      line(shx,shy,ex,ey,2,P.shirt); line(ex,ey,hx,hy,2,P.shirtD); px(hx-1,hy-1,2,2,P.skin);\n    }\n    px(shX-3,sY-1,6,2,P.red); px(shX-5,sY,2,2,P.red);\n    px(hdX-2,hdY,5,5,P.skin); px(hdX+1,hdY+1,1,1,P.hatD);\n    px(hdX-5,hdY-1,11,2,P.hat); px(hdX-5,hdY,11,1,P.hatD);\n    px(hdX-2,hdY-4,6,3,P.hat); px(hdX-2,hdY-1,6,1,P.hatD);\n    ctx.globalAlpha=alpha*0.35;\n    const kick=Math.floor(ph/Math.PI)%3;\n    for (let i=0;i<2+kick;i++) px(cxr-8-i*3-(i%2),footY-(i%2),2,2,'#cdbf8e');\n    ctx.globalAlpha=1;\n  }\n  function drawHorseRider(hx, footY, t, alpha) {\n    if(alpha<=0.01)return;\n    ctx.globalAlpha=alpha;\n    const P={body:'#6b4a2e',bodyD:'#553a23',bodyH:'#86603d',mane:'#3a2715',hoof:'#2a1d10',skin:'#e6b487',hat:'#7a5a36',hatD:'#5c4326',shirt:'#3f6f99',shirtD:'#345b7f',vest:'#b9874a',pants:'#2f4a63',boot:'#3a2a1c',red:'#c0432f',sad:'#8a5a2e'};\n    const gp=t*4*Math.PI, bob=Math.sin(gp)*1.4;\n    const bellyY=footY-12, backY=footY-21+bob;\n    for (const lg of [{x:hx+9,ph:0.0},{x:hx+6,ph:0.5},{x:hx-7,ph:1.0},{x:hx-10,ph:1.6}]) {\n      const a=gp+lg.ph*Math.PI, swing=Math.cos(a)*6, lift=Math.max(0,Math.sin(a))*5;\n      const fx=lg.x+swing, fy=footY-lift;\n      line(lg.x,bellyY,fx,fy,2,P.bodyD); px(fx-1,fy-1,2,2,P.hoof);\n    }\n    px(hx-13,backY,26,10,P.body); px(hx-13,backY,26,2,P.bodyH);\n    px(hx-14,backY+3,4,6,P.body); px(hx+10,backY+1,5,8,P.body);\n    const tsw=Math.sin(gp*0.8)*2;\n    line(hx-14,backY+3,hx-20,backY+9+tsw,3,P.mane); line(hx-14,backY+4,hx-19,backY+12+tsw,2,P.bodyD);\n    line(hx+12,backY+2,hx+19,backY-8,5,P.body);\n    px(hx+17,backY-12,6,5,P.body); px(hx+22,backY-10,3,3,P.bodyD); px(hx+17,backY-14,2,2,P.body); px(hx+20,backY-11,1,1,P.hoof);\n    line(hx+12,backY-1,hx+17,backY-11,2,P.mane);\n    px(hx-3,backY-2,11,3,P.sad); px(hx-3,backY-2,11,1,'#a06a36');\n    const rcx=hx+2, rHip=backY-3, rSh=backY-13, rHd=backY-21;\n    for (let s=0;s<2;s++) {\n      const kx=rcx+4, ky=rHip+5, fx=hx+8, fy=footY-9;\n      line(rcx+(s?1:-1),rHip,kx,ky,3,P.pants); line(kx,ky,fx,fy,2,P.pants); px(fx-1,fy,3,2,P.boot);\n    }\n    px(rcx-3,rSh,6,rHip-rSh+2,P.shirt); px(rcx-2,rSh+2,4,rHip-rSh,P.vest);\n    line(rcx+2,rSh+2,hx+12,backY-6,2,P.shirtD); px(hx+11,backY-7,2,2,P.skin);\n    line(rcx-2,rSh+2,rcx-4,rSh+6,2,P.shirt);\n    px(rcx-3,rSh-1,6,2,P.red);\n    px(rcx-2,rHd,5,5,P.skin); px(rcx+1,rHd+1,1,1,P.hatD);\n    px(rcx-5,rHd-1,11,2,P.hat); px(rcx-5,rHd,11,1,P.hatD); px(rcx-3,rHd-4,6,3,P.hat);\n    ctx.globalAlpha=alpha*0.4;\n    for (let i=0;i<3;i++) { const dx=hx-12-i*5-(gp*2%6); px(dx,footY-(i%2),2,2,'rgba(214,196,150,1)'); }\n    ctx.globalAlpha=1;\n  }\n  function renderAt(rawT) {\n    const t=((rawT%L)+L)%L;\n    ctx.globalAlpha=1; ctx.clearRect(0,0,384,216);\n    drawSky(); drawSun(); drawSunSlits(); drawClouds(t); drawBirds(t); drawMountains(t); drawGround(t); drawGrassTufts(t);\n    const sm=(a,b,x)=>smooth((x-a)/(b-a)), cxr=150, footY=172;\n    let runnerA=0;\n    if(t<6) runnerA=1;\n    else if(t<6.8) runnerA=1-sm(6,6.8,t);\n    let riderA=0;\n    if(t>=6.2&&t<6.8) riderA=sm(6.2,6.8,t);\n    else if(t>=6.8&&t<10.8) riderA=1;\n    else if(t>=10.8&&t<11.8) riderA=1-sm(10.8,11.8,t);\n    let horseX=cxr, horseA=0;\n    if(t>=4.5&&t<6.2){horseX=-52+(cxr+52)*smooth((t-4.5)/1.7);horseA=sm(4.5,5.0,t);}\n    else if(t>=6.2&&t<10.8){horseX=cxr;horseA=1;}\n    else if(t>=10.8&&t<12){horseX=cxr+470*smooth((t-10.8)/1.2);horseA=1-sm(11.4,12,t);}\n    drawHorseRider(horseX,footY,t,Math.min(horseA,riderA>0?1:horseA));\n    drawRunner(cxr,footY,t,runnerA);\n    drawFgGrass(t);\n  }\n  // Honour prefers-reduced-motion: render one static frame and stop\n  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {\n    renderAt(3); // t=3 s — runner mid-stride, good static hero shot\n    return () => {};\n  }\n\n  // 30 fps cap — halves GPU/CPU load on mobile vs 60 fps\n  const FRAME_MS = 1000 / 30;\n  let lastFrame = 0;\n  const loop = () => {\n    raf = requestAnimationFrame(loop);\n    const now = performance.now();\n    if (now - lastFrame < FRAME_MS) return;\n    lastFrame = now;\n    renderAt((now - start) / 1000);\n  };\n  raf = requestAnimationFrame(loop);\n\n  // Pause entirely when the tab is backgrounded (saves battery)\n  const onVisibility = () => {\n    if (document.hidden) {\n      if (raf) { cancelAnimationFrame(raf); raf = null; }\n    } else if (!raf) {\n      raf = requestAnimationFrame(loop);\n    }\n  };\n  document.addEventListener('visibilitychange', onVisibility, { passive: true });\n\n  return () => {\n    if (raf) cancelAnimationFrame(raf);\n    document.removeEventListener('visibilitychange', onVisibility);\n  };\n}\n\n// =========================================================\n//  ROOT RENDER\n// =========================================================\n\nconst $app = document.getElementById('app');\n\nfunction render() {\n  if (_cowboyStop) { _cowboyStop(); _cowboyStop = null; }\n  if (!S.user)          { $app.innerHTML = loginHTML(); bindLogin(); return; }\n  if (S.user.isAdmin)   { $app.innerHTML = adminHTML(); bindAdmin(); return; }\n  if (S.booth !== null) { $app.innerHTML = boothHTML(S.booth); bindBooth(S.booth); return; }\n  $app.innerHTML = mainHTML(); bindMain();\n}\n\n// =========================================================\n//  LOGIN\n// =========================================================\n\nfunction loginHTML() {\n  return `\n  <div id=\"view-login\">\n    <!-- Full-screen pixel-art background -->\n    <div id=\"cowboy-stage\" aria-hidden=\"true\">\n      <canvas id=\"cowboy-canvas\" width=\"384\" height=\"216\"><\u002Fcanvas>\n      <div id=\"cowboy-overlay\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Foreground content (title + login card) -->\n    <div class=\"login-content\">\n      <div id=\"cowboy-text\" aria-label=\"THE NEW DAWN\">\n        <div class=\"ct-the\">THE<\u002Fdiv>\n        <div class=\"ct-nd\">NEW DAWN<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"login-lower\">\n        <div class=\"login-tagline\">เปิดโลกกิจกรรม · สำรวจชมรม<\u002Fdiv>\n        <div class=\"login-card\">\n          <div class=\"login-title\">เริ่มออกเดินทาง<\u002Fdiv>\n          <div class=\"login-subtitle\">ลงทะเบียนเพื่อออกสำรวจชมรม<br>แล้วสะสมแต้มระหว่างทาง<\u002Fdiv>\n\n          <div class=\"input-group\">\n            <label class=\"input-label\" for=\"iname\">ชื่อ-นามสกุล<\u002Flabel>\n            <input id=\"iname\" class=\"input-field\" type=\"text\" placeholder=\"เช่น เป็นหนึ่ง อยากเป็นหมอ\" autocomplete=\"name\" enterkeyhint=\"next\">\n          <\u002Fdiv>\n          <div class=\"input-group\">\n            <label class=\"input-label\" for=\"iid\">รหัสนักศึกษา<\u002Flabel>\n            <input id=\"iid\" class=\"input-field\" type=\"text\" inputmode=\"numeric\" placeholder=\"เช่น 693070001-1\" maxlength=\"13\" autocomplete=\"off\" enterkeyhint=\"go\">\n          <\u002Fdiv>\n          <button class=\"btn-primary\" id=\"btn-login\">🧭 ออกเดินทาง<\u002Fbutton>\n          <div class=\"login-hint\">* ข้อมูลนี้ใช้ยืนยันตัวตนตอนแลกของรางวัลหน้างาน<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction bindLogin() {\n  document.getElementById('iname').addEventListener('keypress', e => {\n    if (e.key === 'Enter') document.getElementById('iid').focus();\n  });\n  document.getElementById('iid').addEventListener('keypress', e => {\n    if (e.key === 'Enter') doLogin();\n  });\n  document.getElementById('btn-login').onclick = doLogin;\n  // Start Running Cowboy animation\n  const cv = document.getElementById('cowboy-canvas');\n  if (cv) _cowboyStop = startCowboyAnimation(cv);\n}\n\nfunction escapeHtml(s) {\n  return String(s).replace(/[&<>\"']/g, c =>\n    ({ '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;' }[c]));\n}\n\nfunction doLogin() {\n  const name  = document.getElementById('iname').value.trim();\n  const idIn  = document.getElementById('iid').value.trim();\n  if (!idIn)  { showToast('กรุณากรอกรหัสนักศึกษา'); return; }\n\n  // ── โหมดแอดมิน: พิมพ์รหัสแอดมินในช่องรหัส → เข้าหน้าภาพรวม (ไม่ต้องกรอกชื่อ) ──\n  if (idIn.replace(/\\D/g, '') === ADMIN_ID) {\n    S.user = { name: name || 'แอดมิน', id: ADMIN_ID, av: '🛠️', isAdmin: true };\n    saveState();\n    render();\n    return;\n  }\n\n  // ── โหมดพรีวิว: เล่นได้เหมือนน้อง แต่ไม่บันทึกขึ้น backend ──\n  if (idIn.replace(/\\D/g, '') === PREVIEW_ID) {\n    S.user = { name: name || 'พรีวิว', id: PREVIEW_ID,\n               av: AVATARS[Math.floor(Math.random() * AVATARS.length)], isPreview: true };\n    saveState();\n    if (S._pendingBooth) { S.booth = S._pendingBooth; S.fromScan = S._pendingBooth; delete S._pendingBooth; }\n    render();\n    showToast('👀 โหมดพรีวิว — ข้อมูลจะไม่ถูกบันทึก');\n    return;\n  }\n\n  if (!name)  { showToast('กรุณากรอกชื่อ-นามสกุล'); return; }\n  const id = lookupStudentId(idIn);\n  if (!id)    { showToast('❌ ไม่พบรหัสนี้ในรายชื่อผู้มีสิทธิ์เข้าร่วม'); return; }\n  S.user = { name, id, av: AVATARS[Math.floor(Math.random() * AVATARS.length)] };\n  saveState();\n  if (S._pendingBooth) { S.booth = S._pendingBooth; S.fromScan = S._pendingBooth; delete S._pendingBooth; }\n  render();\n  // กู้คืนแต้มจริงจากเซิร์ฟเวอร์ (กันแต้มหายเมื่อเปลี่ยนเครื่อง/ล้างเบราว์เซอร์)\n  apiSaveProfile().then(res => {\n    if (res && res.ok) {\n      S.pts = res.earned || 0;\n      S.redeemed = res.redeemed || 0;\n      if (res.done) Object.keys(res.done).forEach(k => S.done.add(parseInt(k)));\n      saveState();\n      render();\n    }\n  });\n}\n\n// =========================================================\n//  ADMIN — หน้าภาพรวม (เข้าด้วยรหัสแอดมิน)\n// =========================================================\n\nfunction adminHTML() {\n  return `\n  <div id=\"view-admin\">\n    <div class=\"app-header\">\n      <div class=\"header-top\">\n        <div style=\"min-width:0;flex:1\">\n          <div class=\"header-greeting\">🛠️ โหมดแอดมิน<\u002Fdiv>\n          <div class=\"header-name\">ภาพรวมงาน<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"icon-btn\" onclick=\"refreshAdmin()\" aria-label=\"รีเฟรชข้อมูล\">🔄<\u002Fbutton>\n        <button class=\"icon-btn\" style=\"margin-left:8px;\" onclick=\"doLogout()\" aria-label=\"ออกจากระบบ\">🚪<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tab-content active\" style=\"padding:16px 16px 60px;\">\n      <div id=\"admin-body\">\n        <div style=\"text-align:center;color:var(--text-light);padding:40px 0;\">⏳ กำลังโหลดข้อมูล...<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction bindAdmin() { refreshAdmin(); }\n\nfunction refreshAdmin() {\n  const body = document.getElementById('admin-body');\n  if (!API_URL) {\n    if (body) body.innerHTML = '<div class=\"scan-error\" role=\"alert\">ยังไม่ได้ตั้งค่า API_URL — ดูข้อมูลภาพรวมไม่ได้<\u002Fdiv>';\n    return;\n  }\n  if (body) body.innerHTML = '<div style=\"text-align:center;color:var(--text-light);padding:40px 0;\">⏳ กำลังโหลดข้อมูล...<\u002Fdiv>';\n  // ดึง 2 อย่าง: สรุปยอด + รายชื่อคนที่เข้าร่วม\n  apiGet('summary', sum => {\n    apiGet('leaderboard', list => {\n      renderAdmin(sum, Array.isArray(list) ? list : []);\n    });\n  });\n}\n\nfunction renderAdmin(sum, list) {\n  const body = document.getElementById('admin-body');\n  if (!body) return;\n  if (!sum || sum.error) {\n    body.innerHTML = '<div class=\"scan-error\" role=\"alert\">โหลดข้อมูลไม่สำเร็จ ลองกดรีเฟรช 🔄 อีกครั้ง<\u002Fdiv>';\n    return;\n  }\n\n  const stat = (label, val, color) => `\n    <div class=\"admin-stat\">\n      <div class=\"admin-stat-num\" style=\"color:${color}\">${val}<\u002Fdiv>\n      <div class=\"admin-stat-lbl\">${label}<\u002Fdiv>\n    <\u002Fdiv>`;\n\n  const stats = `\n    <div class=\"admin-grid\">\n      ${stat('เข้าร่วมแล้ว', sum.joined + '/' + sum.totalStudents, 'var(--primary)')}\n      ${stat('ยังไม่เข้าร่วม', sum.notJoined, 'var(--text-light)')}\n      ${stat('แต้มแจกรวม', sum.totalEarned, 'var(--accent)')}\n      ${stat('แต้มที่ถูกแลก', sum.totalRedeemed, 'var(--success)')}\n      ${stat('จำนวนครั้งแลกของ', sum.totalRedemptions, 'var(--danger)')}\n    <\u002Fdiv>`;\n\n  // ของรางวัลที่ถูกแลกไป\n  const br = sum.byReward || {};\n  const brKeys = Object.keys(br);\n  const rewardsBox = brKeys.length ? `\n    <div class=\"section-title\" style=\"margin-top:18px;\">🎁 ของรางวัลที่แลกไปแล้ว<\u002Fdiv>\n    ${brKeys.map(k => `\n      <div class=\"admin-row\">\n        <span>${k}<\u002Fspan>\n        <strong>${br[k]} ชิ้น<\u002Fstrong>\n      <\u002Fdiv>`).join('')}` :\n    `<div class=\"section-title\" style=\"margin-top:18px;\">🎁 ของรางวัลที่แลกไปแล้ว<\u002Fdiv>\n     <div style=\"color:var(--text-light);font-size:13px;\">ยังไม่มีการแลกของรางวัล<\u002Fdiv>`;\n\n  // รายชื่อผู้เข้าร่วม (เรียงตามแต้มที่ได้รับ)\n  const sorted = [...list].sort((a, b) => (b.earned || 0) - (a.earned || 0));\n  const peopleBox = sorted.length ? `\n    <div class=\"section-title\" style=\"margin-top:18px;\">👥 ผู้เข้าร่วม (${sorted.length} คน)<\u002Fdiv>\n    ${sorted.map((u, i) => `\n      <div class=\"admin-person\">\n        <div class=\"admin-person-rank\">${i + 1}<\u002Fdiv>\n        <div class=\"admin-person-info\">\n          <div class=\"admin-person-name\">${u.av || '🌟'} ${u.name || '-'}<\u002Fdiv>\n          <div class=\"admin-person-id\">${u.id || ''}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"admin-person-pts\">\n          <span title=\"ได้รับ\">⭐${u.earned || 0}<\u002Fspan>\n          <span title=\"แลกไป\" style=\"color:var(--success)\">🎁${u.redeemed || 0}<\u002Fspan>\n          <span title=\"คงเหลือ\" style=\"color:var(--text-light)\">เหลือ ${u.remaining || 0}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>`).join('')}` :\n    `<div class=\"section-title\" style=\"margin-top:18px;\">👥 ผู้เข้าร่วม<\u002Fdiv>\n     <div style=\"color:var(--text-light);font-size:13px;\">ยังไม่มีใครเข้าร่วม<\u002Fdiv>`;\n\n  body.innerHTML = stats + rewardsBox + peopleBox;\n}\n\n// =========================================================\n//  MAIN APP\n// =========================================================\n\nfunction mainHTML() {\n  const visited = S.done.size;\n  const total   = BOOTHS.length;\n  const pct     = Math.round(visited / total * 100);\n\n  // Filtered booths\n  const list = S.filter === 'all' ? BOOTHS : BOOTHS.filter(b => b.type === +S.filter);\n\n  // Completion banner\n  const allDone = visited === total;\n  const banner = allDone ? `\n    <div class=\"completion-banner anim\">\n      🌄 สุดยอด! คุณสำรวจครบทุกบูธแล้ว! เก็บแต้มรวม ${S.pts} แต้ม\n    <\u002Fdiv>` : '';\n\n  // Booth cards\n  const cards = list.map((b, idx) => {\n    const isDone = S.done.has(b.id);\n    const typeLabel = b.type === 1 ? '⚡ สแกนได้เลย' : b.type === 2 ? '❓ ตอบคำถาม' : '🎮 มินิเกม';\n    const aria = `${escapeHtml(b.name)} — รับ ${b.pts} แต้ม${isDone ? ' · สำรวจแล้ว' : ''}`;\n    // Type 3 (mini-game, 3 แต้ม) = full-width feature card — the weightiest destinations\n    if (b.type === 3) {\n      return `\n    <div class=\"booth-card booth-feature ${isDone ? 'visited' : ''} anim\" style=\"--i:${idx}\" role=\"button\" tabindex=\"0\"\n         aria-label=\"${aria}\" onclick=\"openBooth(${b.id})\">\n      <div class=\"booth-card-top-bar\" style=\"background:${b.color}\"><\u002Fdiv>\n      <span class=\"bf-icon\">${b.icon}<\u002Fspan>\n      <div class=\"bf-body\">\n        <div class=\"booth-name\" style=\"margin-bottom:0\">${b.name}<\u002Fdiv>\n        <div class=\"bf-desc\">${b.desc}<\u002Fdiv>\n        <span class=\"booth-type-badge type-3\">${typeLabel}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bf-meta\"><span class=\"booth-pts\">+${b.pts}⭐<\u002Fspan><\u002Fdiv>\n      ${isDone ? '<div class=\"done-check\">✓<\u002Fdiv>' : ''}\n    <\u002Fdiv>`;\n    }\n    return `\n    <div class=\"booth-card ${isDone ? 'visited' : ''} anim\" style=\"--i:${idx}\" role=\"button\" tabindex=\"0\"\n         aria-label=\"${aria}\" onclick=\"openBooth(${b.id})\">\n      <div class=\"booth-card-top-bar\" style=\"background:${b.color}\"><\u002Fdiv>\n      <span class=\"booth-icon\">${b.icon}<\u002Fspan>\n      <div class=\"booth-name\">${b.name}<\u002Fdiv>\n      <div class=\"booth-footer\">\n        <span class=\"booth-type-badge type-${b.type}\">${typeLabel}<\u002Fspan>\n        <span class=\"booth-pts\">+${b.pts}⭐<\u002Fspan>\n      <\u002Fdiv>\n      ${isDone ? '<div class=\"done-check\">✓<\u002Fdiv>' : ''}\n    <\u002Fdiv>`;\n  }).join('');\n\n\n  return `\n  <div id=\"view-main\">\n    <div class=\"app-header\">\n      <canvas id=\"header-cowboy-canvas\" width=\"384\" height=\"216\" aria-hidden=\"true\"><\u002Fcanvas>\n      <div class=\"header-canvas-overlay\" aria-hidden=\"true\"><\u002Fdiv>\n      <div class=\"header-inner\">\n        <div class=\"header-top\">\n          <div style=\"min-width:0;flex:1\">\n            <div class=\"header-brand\">THE NEW DAWN<\u002Fdiv>\n            <div class=\"header-greeting\">Welcome, Little Cowboys 👋<\u002Fdiv>\n            <div class=\"header-name\">${S.user.name}<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"points-badge\">\n            <div class=\"points-num\">🪙 ${pointsLeft()}<\u002Fdiv>\n            <div class=\"points-label\">Coins<\u002Fdiv>\n          <\u002Fdiv>\n          <button class=\"icon-btn\" style=\"margin-left:8px;\" onclick=\"doLogout()\" aria-label=\"ออกจากระบบ\">🚪<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"progress-area\">\n          <div class=\"progress-text\">\n            <span>Campsite ${visited}/${total} <\u002Fspan>\n            <span>${pct}%<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"progress-bar-bg\">\n            <div class=\"progress-bar-fill\" id=\"pbar\" style=\"transform:scaleX(0)\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    ${S.user.isPreview ? '<div class=\"preview-bar\">👀 โหมดพรีวิว — ข้อมูลจะไม่ถูกบันทึกขึ้นระบบ<\u002Fdiv>' : ''}\n\n    <div class=\"tab-nav\">\n      <button class=\"tab-btn ${S.tab === 'booths' ? 'active' : ''}\" onclick=\"switchTab('booths')\">Campsite<\u002Fbutton>\n      <button class=\"tab-btn ${S.tab === 'rewards' ? 'active' : ''}\" onclick=\"switchTab('rewards')\">Saloon<\u002Fbutton>\n      <button class=\"tab-btn ${S.tab === 'rank' ? 'active' : ''}\" onclick=\"switchTab('rank')\">🏆 Ranking<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"tab-content ${S.tab === 'booths' ? 'active' : ''}\" id=\"tab-booths\">\n      ${banner}\n      <div class=\"campsite-wrap\">\n        <iframe class=\"campsite-banner\" src=\"campsite2.html\" scrolling=\"no\" title=\"Cowboy Campsite\" aria-hidden=\"true\" loading=\"lazy\"><\u002Fiframe>\n      <\u002Fdiv>\n      <div class=\"section-title\">เลือกจุดหมายที่อยากไปสำรวจ<\u002Fdiv>\n      <div class=\"filter-row\">\n        <button class=\"filter-chip ${S.filter==='all'?'active':''}\" onclick=\"setFilter('all')\">ทั้งหมด (${total})<\u002Fbutton>\n        <button class=\"filter-chip ${S.filter==='1'  ?'active':''}\" onclick=\"setFilter('1')\">⚡ สแกนง่าย (5)<\u002Fbutton>\n        <button class=\"filter-chip ${S.filter==='2'  ?'active':''}\" onclick=\"setFilter('2')\">❓ ตอบคำถาม (7)<\u002Fbutton>\n        <button class=\"filter-chip ${S.filter==='3'  ?'active':''}\" onclick=\"setFilter('3')\">🎮 มินิเกม (3)<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"booth-grid\">${cards}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tab-content ${S.tab === 'rewards' ? 'active' : ''}\" id=\"tab-rewards\">\n      <div class=\"rewards-balance\">\n        <iframe class=\"rewards-balance-iframe\" src=\"saloon.html\" scrolling=\"no\" aria-hidden=\"true\" loading=\"lazy\"><\u002Fiframe>\n        <div class=\"rewards-balance-overlay\">\n          <div class=\"rewards-balance-num\">🪙 ${pointsLeft()} <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rewards-info\">\n        <div class=\"rewards-balance-lbl\">แต้มที่ใช้แลกได้ตอนนี้<\u002Fdiv>\n        <div class=\"rewards-balance-sub\">ได้รับสะสม ${S.pts} • แลกไปแล้ว ${S.redeemed} แต้ม<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"section-title\">เลือกของรางวัลที่อยากแลก<\u002Fdiv>\n      <div id=\"rewards-list\">${buildRewardsHtml()}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tab-content ${S.tab === 'rank' ? 'active' : ''}\" id=\"tab-rank\">\n      <div class=\"rank-head\">\n        <div class=\"section-title\" style=\"margin-bottom:0;\">🏆 อันดับแต้มสะสม<\u002Fdiv>\n        <button class=\"rank-refresh\" onclick=\"loadLeaderboard(true)\" aria-label=\"รีเฟรชอันดับ\">🔄<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"rank-list\">\n        <div style=\"text-align:center;color:var(--text-light);padding:30px 0;\">⏳ กำลังโหลดอันดับ...<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"modal-root-main\"><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n// ───── รายการของรางวัล ─────\nfunction buildRewardsHtml() {\n  const left = pointsLeft();\n  return REWARDS.map((r, idx) => {\n    const count   = S.redemptions.filter(x => x.id === r.id).length;\n    const canAfford = left >= r.cost;\n    const badge = count > 0\n      ? `<span class=\"reward-count\">แลกแล้ว ${count} ครั้ง<\u002Fspan>` : '';\n    const btn = canAfford\n      ? `<button class=\"reward-btn\" onclick=\"openRedeemModal('${r.id}')\">แลก<\u002Fbutton>`\n      : `<button class=\"reward-btn disabled\" disabled>ขาดอีก ${r.cost - left} แต้ม<\u002Fbutton>`;\n    return `\n    <div class=\"reward-card anim ${canAfford ? '' : 'cant'}\" style=\"--i:${idx}\">\n      <div class=\"reward-ic\">${r.icon}<\u002Fdiv>\n      <div class=\"reward-mid\">\n        <div class=\"reward-name\">${r.name} ${badge}<\u002Fdiv>\n        <div class=\"reward-desc\">${r.desc}<\u002Fdiv>\n        <div class=\"reward-cost\">⭐ ${r.cost} แต้ม<\u002Fdiv>\n      <\u002Fdiv>\n      ${btn}\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n// ───── เปิด modal ให้สตาฟกด PIN ยืนยันการแลก ─────\nfunction openRedeemModal(rewardId) {\n  const r = REWARDS.find(x => x.id === rewardId);\n  if (!r) return;\n  if (pointsLeft() < r.cost) { showToast('แต้มไม่พอแลกของชิ้นนี้'); return; }\n  const mr = document.getElementById('modal-root-main');\n  if (!mr) return;\n  mr.innerHTML = `\n  <div class=\"modal-overlay\" onclick=\"if(event.target===this)closeRedeemModal()\">\n    <div class=\"modal-card\" role=\"dialog\" aria-modal=\"true\">\n      <div class=\"modal-emoji\">${r.icon}<\u002Fdiv>\n      <div class=\"modal-title\">${r.name}<\u002Fdiv>\n      <div class=\"modal-sub\">ใช้ <strong>${r.cost} แต้ม<\u002Fstrong> • เหลือหลังแลก ${pointsLeft() - r.cost} แต้ม<\u002Fdiv>\n      <div class=\"staff-box\">\n        <label class=\"staff-label\" for=\"staff-pin\">🔒 ให้สตาฟกรอกรหัสเพื่อยืนยันการแลก<\u002Flabel>\n        <input id=\"staff-pin\" class=\"input-field\" type=\"tel\" inputmode=\"numeric\"\n               placeholder=\"รหัสสตาฟ\" autocomplete=\"off\" aria-label=\"รหัสสตาฟ\" style=\"text-align:center;letter-spacing:4px;font-size:20px;\">\n        <div id=\"staff-err\" class=\"staff-err\" role=\"alert\" aria-live=\"assertive\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"confirmRedeem('${r.id}')\">✅ ยืนยันการแลก<\u002Fbutton>\n      <button class=\"btn-ghost\" onclick=\"closeRedeemModal()\" style=\"margin-top:10px;\">ยกเลิก<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  setTimeout(() => { const i = document.getElementById('staff-pin'); if (i) i.focus(); }, 100);\n}\n\nfunction closeRedeemModal() {\n  const mr = document.getElementById('modal-root-main');\n  if (mr) mr.innerHTML = '';\n}\n\n// ───── สตาฟยืนยัน → ส่ง PIN ไปตรวจที่เซิร์ฟเวอร์ + เซิร์ฟเวอร์หักแต้มเอง ─────\nasync function confirmRedeem(rewardId) {\n  const r = REWARDS.find(x => x.id === rewardId);\n  if (!r) return;\n  const pin = ((document.getElementById('staff-pin') || {}).value || '').trim();\n  const err = document.getElementById('staff-err');\n  if (!pin) { if (err) err.textContent = '❌ กรุณากรอกรหัสสตาฟ'; return; }\n\n  // โหมดพรีวิว — จำลองการแลกในเครื่อง (ไม่ตรวจ PIN จริง ไม่บันทึกขึ้นระบบ)\n  if (S.user && S.user.isPreview) {\n    if (pointsLeft() < r.cost) { showToast('แต้มไม่พอแล้ว'); closeRedeemModal(); return; }\n    S.redeemed += r.cost;\n    S.redemptions.push({ id: r.id, name: r.name, cost: r.cost, time: Date.now() });\n    saveState();\n    showRedeemSuccess(r);\n    return;\n  }\n\n  if (err) err.textContent = '⏳ กำลังยืนยันกับระบบ...';\n  const res = await apiRedeem(r, pin);\n  if (!res || res.error) {\n    if (err) err.textContent = '❌ ' + ((res && res.error) || 'เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง');\n    return;\n  }\n  // สำเร็จ — ยึดยอดแต้มจากเซิร์ฟเวอร์เป็นหลัก\n  if (typeof res.earned === 'number')   S.pts = res.earned;\n  if (typeof res.redeemed === 'number') S.redeemed = res.redeemed;\n  S.redemptions.push({ id: r.id, name: r.name, cost: r.cost, time: Date.now() });\n  saveState();\n  showRedeemSuccess(r);\n}\n\nfunction showRedeemSuccess(r) {\n  const mr = document.getElementById('modal-root-main');\n  if (mr) mr.innerHTML = `\n  <div class=\"modal-overlay\">\n    <div class=\"modal-card\" role=\"dialog\" aria-modal=\"true\">\n      <div class=\"modal-emoji\">🎉<\u002Fdiv>\n      <div class=\"modal-title\">แลกสำเร็จ!<\u002Fdiv>\n      <div class=\"modal-sub\">รับ \"${r.name}\" ได้ที่สตาฟเลย<\u002Fdiv>\n      <div class=\"modal-pts\">−${r.cost} ⭐<\u002Fdiv>\n      <div class=\"modal-total\">แต้มคงเหลือ: <strong>${pointsLeft()}<\u002Fstrong> แต้ม<\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"closeRedeemModal();render();\">🎁 แลกต่อ / กลับ<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  const btn = mr.querySelector('.btn-primary');\n  if (btn) btn.focus();\n}\n\nfunction bindMain() {\n  requestAnimationFrame(() => {\n    const pbar = document.getElementById('pbar');\n    if (pbar) pbar.style.transform = 'scaleX(' + (S.done.size / BOOTHS.length) + ')';\n  });\n  if (S.tab === 'rank') loadLeaderboard();\n  const hcv = document.getElementById('header-cowboy-canvas');\n  if (hcv) _cowboyStop = startCowboyAnimation(hcv);\n}\n\nfunction switchTab(tab) {\n  if (tab !== 'rank') stopRankAuto();\n  S.tab = tab;\n  render();\n}\nfunction setFilter(f)   { S.filter = f; render(); }\nfunction openBooth(id)  { stopRankAuto(); S.booth = id; S.game = null; render(); }\n\n// =========================================================\n//  LEADERBOARD (อันดับสด)\n// =========================================================\nlet _rankTimer = null;\n\nfunction loadLeaderboard(force) {\n  const box = document.getElementById('rank-list');\n  if (!box) return;\n  if (!API_URL) { box.innerHTML = '<div class=\"scan-error\" role=\"alert\">ยังไม่ได้ตั้งค่า API — ดูอันดับไม่ได้<\u002Fdiv>'; return; }\n  if (force) box.innerHTML = '<div style=\"text-align:center;color:var(--text-light);padding:30px 0;\">⏳ กำลังโหลดอันดับ...<\u002Fdiv>';\n  apiGet('leaderboard', list => renderLeaderboard(Array.isArray(list) ? list : []));\n  startRankAuto();\n}\n\nfunction renderLeaderboard(list) {\n  const box = document.getElementById('rank-list');\n  if (!box) return;\n  const sorted = [...list].sort((a, b) => (b.earned || 0) - (a.earned || 0));\n  if (!sorted.length) {\n    box.innerHTML = '<div style=\"color:var(--text-light);font-size:13px;text-align:center;padding:24px 0;\">ยังไม่มีใครเก็บแต้ม — มาเป็นคนแรกกันเลย! 🚀<\u002Fdiv>';\n    return;\n  }\n  const myId  = (S.user && S.user.id) ? String(S.user.id).replace(/\\D/g, '') : '';\n  const medal = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : ('#' + (i + 1));\n  box.innerHTML = sorted.map((u, i) => {\n    const isMe = myId && String(u.id || '').replace(/\\D/g, '') === myId;\n    return `\n    <div class=\"rank-row${isMe ? ' me' : ''} anim\">\n      <div class=\"rank-pos\">${medal(i)}<\u002Fdiv>\n      <div class=\"rank-av\">${escapeHtml(u.av || '🌟')}<\u002Fdiv>\n      <div class=\"rank-name\">${escapeHtml(u.name || '-')}${isMe ? ' <span class=\"rank-you\">คุณ<\u002Fspan>' : ''}<\u002Fdiv>\n      <div class=\"rank-pts\">⭐ ${parseInt(u.earned) || 0}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n// รีเฟรชอันดับอัตโนมัติทุก 30 วิ เฉพาะตอนอยู่หน้าอันดับ\nfunction startRankAuto() {\n  stopRankAuto();\n  _rankTimer = setInterval(() => {\n    if (S.tab === 'rank' && S.booth === null && S.user && !S.user.isAdmin) {\n      apiGet('leaderboard', list => renderLeaderboard(Array.isArray(list) ? list : []));\n    } else {\n      stopRankAuto();\n    }\n  }, 30000);\n}\nfunction stopRankAuto() { if (_rankTimer) { clearInterval(_rankTimer); _rankTimer = null; } }\n\n// =========================================================\n//  BOOTH DETAIL\n// =========================================================\n\nfunction boothHTML(id) {\n  const b = BOOTHS.find(x => x.id === id);\n  const isDone = S.done.has(id);\n\n  const typeLabel = b.type === 1 ? '⚡ สแกนง่าย • 1 แต้ม'\n                  : b.type === 2 ? '❓ ตอบคำถาม • 2 แต้ม'\n                  : '🎮 มินิเกม • 3 แต้ม';\n\n  let activity = '';\n  if (isDone) {\n    activity = `\n    <div class=\"activity-card\">\n      <div class=\"done-state\">\n        <div class=\"done-state-icon\">✅<\u002Fdiv>\n        <div class=\"done-state-text\">สำรวจบูธนี้แล้ว!<\u002Fdiv>\n        <div class=\"done-state-sub\">ได้รับ ${b.pts} แต้มไปแล้ว 🎉<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  } else if (b.type === 1) {\n    activity = `\n    <div class=\"activity-card\">\n      <div class=\"act-title\">📱 สแกน QR Code<\u002Fdiv>\n      <div class=\"act-sub\">เปิดกล้องแล้วส่องไปที่ QR Code ที่ติดอยู่หน้าบูธ เพื่อรับ 1 แต้ม<\u002Fdiv>\n      <div id=\"scan-area\">\n        <div class=\"qr-box\">📷<\u002Fdiv>\n        <button class=\"btn-scan\" onclick=\"startScanner(${id})\">\n          <span style=\"font-size:20px\">📲<\u002Fspan> เปิดกล้องสแกน QR\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  } else if (b.type === 2) {\n    const opts = b.opts.map((o, i) =>\n      `<button class=\"opt-btn\" id=\"opt${i}\" onclick=\"doAnswer(${id},${i})\">${o}<\u002Fbutton>`\n    ).join('');\n    activity = `\n    <div class=\"activity-card\">\n      <div class=\"act-title\">❓ ตอบคำถาม<\u002Fdiv>\n      <div class=\"act-sub\">ตอบถูกได้ 2 แต้ม / ตอบผิดได้ 1 แต้มจากการเยี่ยมชม<\u002Fdiv>\n      <div class=\"question-text\">${b.q}<\u002Fdiv>\n      <div class=\"options-grid\" id=\"opts\">${opts}<\u002Fdiv>\n      <div class=\"q-result\" id=\"qres\" role=\"status\" aria-live=\"polite\"><\u002Fdiv>\n    <\u002Fdiv>`;\n  } else {\n    activity = memGameHTML();\n  }\n\n  return `\n  <div id=\"view-booth\">\n    <div class=\"booth-detail-header\">\n      <button class=\"back-btn\" onclick=\"closeBooth()\" aria-label=\"ย้อนกลับ\">←<\u002Fbutton>\n      <div class=\"detail-title\">${b.name}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"detail-body\">\n      <div class=\"booth-hero-card\">\n        ${clubImg(id)\n          ? `<img class=\"hero-img\" src=\"${clubImg(id)}\" alt=\"${b.name}\" onerror=\"this.style.display='none'\">`\n          : `<div class=\"hero-icon\">${b.icon}<\u002Fdiv>`}\n        <div class=\"hero-name\">${b.name}<\u002Fdiv>\n        <div class=\"hero-desc\">${b.desc}<\u002Fdiv>\n        <div class=\"reward-pill\">⭐ รับ ${b.pts} แต้ม &nbsp;•&nbsp; ${typeLabel}<\u002Fdiv>\n        ${clubSignup(id)\n          ? `<a class=\"btn-signup\" href=\"${clubSignup(id)}\" target=\"_blank\" rel=\"noopener\">📝 สมัคร / ดูรายละเอียดชมรม<\u002Fa>`\n          : ''}\n      <\u002Fdiv>\n      ${activity}\n    <\u002Fdiv>\n    <div id=\"modal-root\"><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction bindBooth(id) {\n  const b = BOOTHS.find(x => x.id === id);\n  if (b.type === 3 && !S.done.has(id)) initGame(id);\n\n  // บูธ Type 1 ที่เข้ามาผ่านการสแกน QR จริง (?booth=N&t=...) → ได้แต้มทันที ไม่ต้องสแกนซ้ำ\n  if (b.type === 1 && !S.done.has(id) && S.fromScan === id) {\n    S.fromScan = null;\n    setTimeout(() => { if (S.booth === id && !S.done.has(id)) award(id, false, S.tokens[id]); }, 600);\n  }\n}\n\nfunction closeBooth() { stopScanner(); S.booth = null; S.game = null; render(); }\n\n// ───── กล้องสแกน QR จริง (ใช้ตอนเปิดบูธ Type 1 จากในแอป) ─────\nfunction startScanner(id) {\n  const area = document.getElementById('scan-area');\n  if (!area) return;\n\n  if (typeof Html5Qrcode === 'undefined') {\n    area.innerHTML = `<div class=\"scan-error\" role=\"alert\">⚠️ โหลดตัวสแกนไม่สำเร็จ (อาจไม่มีเน็ต)<br>ลองรีเฟรชหน้าใหม่อีกครั้ง<\u002Fdiv>\n      <button class=\"btn-scan\" onclick=\"startScanner(${id})\">🔄 ลองอีกครั้ง<\u002Fbutton>`;\n    return;\n  }\n\n  area.innerHTML = `\n    <div id=\"reader\"><\u002Fdiv>\n    <div class=\"scan-hint\">📷 ส่องกล้องไปที่ QR Code ของบูธนี้<\u002Fdiv>\n    <button class=\"btn-ghost\" onclick=\"stopScanner(true)\">ยกเลิก<\u002Fbutton>`;\n\n  _scanner = new Html5Qrcode('reader');\n  _scanner.start(\n    { facingMode: 'environment' },\n    { fps: 10, qrbox: { width: 220, height: 220 } },\n    (decodedText) => onScanSuccess(id, decodedText),\n    () => {} // ละเว้น error ระหว่างหา QR\n  ).catch(err => {\n    area.innerHTML = `\n      <div class=\"scan-error\" role=\"alert\">\n        ⚠️ เปิดกล้องไม่ได้: ${err && err.name ? err.name : 'ไม่ทราบสาเหตุ'}<br>\n        กรุณาอนุญาตให้เว็บเข้าถึงกล้อง แล้วลองใหม่ (ต้องเปิดผ่าน https เท่านั้น)\n      <\u002Fdiv>\n      <button class=\"btn-scan\" onclick=\"startScanner(${id})\">🔄 ลองเปิดกล้องอีกครั้ง<\u002Fbutton>`;\n  });\n}\n\nfunction onScanSuccess(boothId, decodedText) {\n  // ดึงค่า booth + token (t) จาก URL ที่สแกนได้ แล้วเช็คว่าตรงกับบูธนี้ไหม\n  let scanned = null, token = '';\n  try {\n    const m = String(decodedText).match(/[?&]booth=(\\d+)/);\n    if (m) scanned = parseInt(m[1]);\n    const mt = String(decodedText).match(/[?&]t=([^&\\s]+)/);\n    if (mt) token = decodeURIComponent(mt[1]);\n  } catch (e) {}\n\n  if (scanned === boothId) {\n    if (token) S.tokens[boothId] = token;   // เก็บ token ไว้ส่งยืนยันกับเซิร์ฟเวอร์\n    stopScanner();\n    award(boothId, false, token);\n  } else if (scanned) {\n    showToast('❌ QR นี้เป็นของบูธอื่น (บูธ ' + scanned + ')');\n  } else {\n    showToast('❌ QR ไม่ถูกต้อง ลองส่องใหม่อีกครั้ง');\n  }\n}\n\nfunction stopScanner(restoreUi) {\n  if (_scanner) {\n    const s = _scanner;\n    _scanner = null;\n    s.stop().then(() => s.clear()).catch(() => {});\n  }\n  if (restoreUi && S.booth !== null) render();\n}\n\nfunction doAnswer(id, i) {\n  const b = BOOTHS.find(x => x.id === id);\n  document.querySelectorAll('.opt-btn').forEach(el => el.disabled = true);\n  const res = document.getElementById('qres');\n  if (i === b.ans) {\n    document.getElementById('opt' + i).classList.add('correct');\n    res.textContent = '🎉 ถูกต้อง! ยอดเยี่ยมมาก!';\n    res.style.color = 'var(--success)';\n    setTimeout(() => award(id, true, S.tokens[id]), 1100);\n  } else {\n    document.getElementById('opt' + i).classList.add('wrong');\n    document.getElementById('opt' + b.ans).classList.add('correct');\n    res.textContent = '😅 ไม่ถูกต้อง แต่ได้ 1 แต้มจากการเยี่ยมชม!';\n    res.style.color = 'var(--danger)';\n    setTimeout(() => award(id, false, S.tokens[id]), 1400);\n  }\n}\n\n// =========================================================\n//  MEMORY GAME\n// =========================================================\n\nfunction memGameHTML() {\n  return `\n  <div class=\"activity-card\">\n    <div class=\"act-title\">🃏 เกมจับคู่การ์ด<\u002Fdiv>\n    <div class=\"act-sub\">จับคู่ให้ครบ 6 คู่ รับ 3 แต้ม!<\u002Fdiv>\n    <div class=\"game-stats\">\n      <span>พลิกแล้ว: <strong id=\"gflip\">0<\u002Fstrong> ครั้ง<\u002Fspan>\n      <span>จับคู่ได้: <strong id=\"gmatch\">0<\u002Fstrong>/6<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"memory-grid\" id=\"mgrid\"><\u002Fdiv>\n    <div class=\"game-msg\" id=\"gmsg\" role=\"status\" aria-live=\"polite\"><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction initGame(boothId) {\n  const emojis = GAME_EMOJIS.slice(0, 6);\n  const cards = [...emojis, ...emojis]\n    .sort(() => Math.random() - 0.5)\n    .map((e, i) => ({ idx: i, emoji: e, flipped: false, matched: false }));\n  S.game = { cards, revealed: [], matches: 0, flips: 0, locked: false, boothId };\n  drawGame();\n}\n\nfunction drawGame() {\n  const g = document.getElementById('mgrid');\n  if (!g) return;\n  g.innerHTML = S.game.cards.map((c, i) => `\n    <div class=\"mc ${c.flipped || c.matched ? 'flipped' : ''} ${c.matched ? 'matched' : ''}\"\n         role=\"button\" tabindex=\"0\" aria-label=\"${c.matched ? 'จับคู่แล้ว' : c.flipped ? 'การ์ดเปิดอยู่' : 'การ์ดปิด แตะเพื่อเปิด'}\"\n         onclick=\"flipCard(${i})\">\n      <div class=\"mc-face mc-back\" aria-hidden=\"true\">❓<\u002Fdiv>\n      <div class=\"mc-face mc-front\">${c.emoji}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\nfunction flipCard(i) {\n  const g = S.game;\n  if (!g || g.locked) return;\n  const c = g.cards[i];\n  if (c.flipped || c.matched) return;\n  if (g.revealed.length >= 2) return;\n\n  c.flipped = true;\n  g.revealed.push(i);\n  g.flips++;\n  document.getElementById('gflip').textContent = g.flips;\n  drawGame();\n\n  if (g.revealed.length === 2) {\n    g.locked = true;\n    const [a, b] = g.revealed;\n    if (g.cards[a].emoji === g.cards[b].emoji) {\n      g.cards[a].matched = g.cards[b].matched = true;\n      g.matches++;\n      g.revealed = [];\n      g.locked = false;\n      document.getElementById('gmatch').textContent = g.matches;\n      drawGame();\n      if (g.matches === 6) {\n        document.getElementById('gmsg').textContent = '🎉 จับคู่ครบแล้ว! เก่งมาก!';\n        setTimeout(() => award(g.boothId, false, S.tokens[g.boothId]), 700);\n      }\n    } else {\n      setTimeout(() => {\n        g.cards[a].flipped = g.cards[b].flipped = false;\n        g.revealed = [];\n        g.locked = false;\n        drawGame();\n      }, 800);\n    }\n  }\n}\n\n// =========================================================\n//  AWARD & MODAL\n// =========================================================\n\n// award — ส่งการเยี่ยมบูธไปให้ \"เซิร์ฟเวอร์เป็นคนให้แต้ม\" (กันปลอมแต้ม)\n//  correct = ตอบถูกไหม (บูธคำถาม), token = ค่า t จาก QR (บูธสแกนบังคับต้องมี)\nasync function award(id, correct, token) {\n  stopScanner();\n  showSavingModal();\n  const res = await apiVisit(id, correct, token);\n\n  // โหมดพรีวิว / ยังไม่ตั้งค่า API → คำนวณแต้มในเครื่องอย่างเดียว\n  if (res && res._local) {\n    const pts = boothPointsLocal(id, correct);\n    S.done.add(id); S.pts += pts; saveState();\n    showAwardModal(pts);\n    return;\n  }\n  // ล้มเหลว (เช่น QR ไม่ถูกต้อง / เน็ตหลุด) → แจ้งเตือนแล้วกลับไปให้ลองใหม่\n  if (!res || res.error) {\n    showToast(res && res.error ? '❌ ' + res.error : '⚠️ บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง');\n    render();\n    return;\n  }\n  // สำเร็จ — ยึดแต้มจริงจากเซิร์ฟเวอร์\n  S.pts = res.earned;\n  S.redeemed = res.redeemed;\n  S.done.add(id);\n  if (res.done) Object.keys(res.done).forEach(k => S.done.add(parseInt(k)));\n  saveState();\n\n  if (res.already && (!res.awarded)) {\n    showToast('✅ บูธนี้เก็บแต้มไปแล้ว');\n    render();\n    return;\n  }\n  showAwardModal(typeof res.awarded === 'number' ? res.awarded : boothPointsLocal(id, correct));\n}\n\nfunction showSavingModal() {\n  const mr = document.getElementById('modal-root');\n  if (!mr) return;\n  mr.innerHTML = `\n  <div class=\"modal-overlay\">\n    <div class=\"modal-card\" role=\"dialog\" aria-modal=\"true\">\n      <div class=\"modal-emoji\">⏳<\u002Fdiv>\n      <div class=\"modal-title\">กำลังบันทึกแต้ม...<\u002Fdiv>\n      <div class=\"modal-sub\">รอสักครู่นะ<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction showAwardModal(pts) {\n  const mr = document.getElementById('modal-root');\n  if (!mr) return;\n  mr.innerHTML = `\n  <div class=\"modal-overlay\">\n    <div class=\"modal-card\" role=\"dialog\" aria-modal=\"true\">\n      <div class=\"modal-emoji\">🎉<\u002Fdiv>\n      <div class=\"modal-title\">ยอดเยี่ยม!<\u002Fdiv>\n      <div class=\"modal-sub\">คุณได้รับแต้มจากบูธนี้แล้ว<\u002Fdiv>\n      <div class=\"modal-pts\">+${pts} ⭐<\u002Fdiv>\n      <div class=\"modal-total\">แต้มที่ใช้แลกได้ตอนนี้: <strong>${pointsLeft()}<\u002Fstrong> แต้ม<\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"afterAward()\">🧭 ออกสำรวจต่อ!<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  const btn = mr.querySelector('.btn-primary');\n  if (btn) btn.focus();\n}\n\nfunction afterAward() { S.booth = null; S.game = null; render(); }\n\n// =========================================================\n//  UTILS\n// =========================================================\n\n// กัน HTML/สคริปต์แปลกปลอมจากชื่อที่น้องกรอก (แสดงให้คนอื่นเห็นในหน้าอันดับ)\nfunction escapeHtml(s) {\n  return String(s == null ? '' : s)\n    .replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;')\n    .replace(/\"/g, '&quot;').replace(/'/g, '&#39;');\n}\n\nfunction showToast(msg) {\n  const old = document.getElementById('toast');\n  if (old) old.remove();\n  const t = document.createElement('div');\n  t.id = 'toast';\n  t.className = 'toast';\n  t.setAttribute('role', 'status');\n  t.setAttribute('aria-live', 'polite');\n  t.textContent = msg;\n  document.body.appendChild(t);\n  setTimeout(() => t.remove(), 2200);\n}\n\nfunction doLogout() {\n  const msg = (S.user && S.user.isAdmin)   ? 'ออกจากโหมดแอดมิน?'\n            : (S.user && S.user.isPreview) ? 'ออกจากโหมดพรีวิว?'\n            : 'ออกจากระบบ? แต้มของคุณจะถูกลบออก';\n  if (!confirm(msg)) return;\n  stopRankAuto();\n  clearState(); render();\n}\n\n// =========================================================\n//  INIT\n// =========================================================\n\nloadState();\n// อ่าน ?booth=X&t=TOKEN จาก URL (เมื่อสแกน QR Code ที่บูธด้วยกล้องมือถือ)\nconst _urlParams = new URLSearchParams(window.location.search);\nconst _urlBooth  = parseInt(_urlParams.get('booth'));\nconst _urlToken  = _urlParams.get('t') || '';\nif (_urlBooth >= 1 && _urlBooth <= 15) {\n  if (_urlToken) S.tokens[_urlBooth] = _urlToken;   // เก็บ token ไว้ส่งยืนยันกับเซิร์ฟเวอร์\n  if (S.user) { S.booth = _urlBooth; S.fromScan = _urlBooth; }\n  else        { S._pendingBooth = _urlBooth; }\n}\n\n// ── A11y: keyboard support for card-style buttons + Escape to dismiss ──\ndocument.addEventListener('keydown', (e) => {\n  const t = e.target;\n  // Enter / Space activates any element exposed as role=\"button\" (booth cards, memory cards)\n  if ((e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') &&\n      t && t.getAttribute && t.getAttribute('role') === 'button') {\n    e.preventDefault();\n    t.click();\n    return;\n  }\n  if (e.key === 'Escape') {\n    const mrMain = document.getElementById('modal-root-main');\n    if (mrMain && mrMain.innerHTML.trim()) { closeRedeemModal(); return; }\n    const mr = document.getElementById('modal-root');\n    if (mr && mr.innerHTML.trim()) return;   // award/saving modals close via their own button\n    if (S.booth !== null) closeBooth();\n  }\n});\n\nrender();\n<\u002Fscript>\n\n\n\n<style id=\"__om-edit-overrides\">\n#view-main .header-top .header-greeting { font-family: sans-serif !important }\n#view-main .header-top .header-greeting { font-family: Sarabun !important }\n#view-main .header-top .header-greeting { font-family: Arial !important }\n#view-main .header-top .header-greeting { font-family: Helvetica !important }\n#view-main .header-top .header-greeting { font-family: \"Courier New\" !important }\n#view-main .header-top .header-greeting { font-family: Verdana !important }\n#view-main .header-top .header-greeting { font-family: \"Trebuchet MS\" !important }\n#view-main .header-top .header-greeting { font-family: Palatino !important }\n#view-main .header-top .header-name { margin: 10px !important }\n#view-main .header-top .header-name { margin: 1px !important }\n#view-main .header-top .header-name { margin: 5px !important }\n#view-main .header-top .header-name { font-size: 15px !important }\n#view-main .header-top .header-name { font-size: 18px !important }\n#view-main [onclick=\"switchTab('booths')\"] { font-family: Cinzel !important }\n#view-main >.tab-nav >.active { font-family: Cinzel !important }\n#view-main [onclick=\"switchTab('rank')\"] { font-family: Cinzel !important }\n#tab-rewards .rewards-balance-num { font-size: 40px !important }\n#tab-rewards .rewards-balance-num { margin: 2px !important }\n#tab-rewards .rewards-balance-num { margin: 22px !important }\n#tab-rewards .rewards-balance-num { margin: 2px !important }\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
  </script>
