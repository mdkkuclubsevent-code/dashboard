document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4b74dc0e-0b5f-4886-9bfa-0090ccaa4dce\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  html,body{margin:0;height:100%;background:#0e0c09;}\n  *{box-sizing:border-box;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ rootRef }}\" data-screen-label=\"0s\" data-om-exportable-video-with-duration-secs=\"12\" style=\"position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 140% at 50% 0%, #1a1813 0%, #0c0a07 100%);overflow:hidden;\">\n  <canvas ref=\"{{ canvasRef }}\" style=\"width:100%;height:auto;max-height:100vh;display:block;image-rendering:pixelated;box-shadow:0 0 60px rgba(0,0,0,0.6);\"><\u002Fcanvas>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:200},&quot;signText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;SALOON&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Saloon&quot;},&quot;mood&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dawn&quot;,&quot;options&quot;:[&quot;dawn&quot;,&quot;dusk&quot;,&quot;noon&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Scene&quot;}}\">\nclass Component extends DCLogic {\n  canvasRef = React.createRef();\n  rootRef = React.createRef();\n\n  W = 320; H = 100; HOR = 58;\n  hx = 150;\n  DUR = 12;\n  RIDE_END = 2.6; DECEL = 3.9; SPEED = 40;\n  D0 = 4.0; D1 = 4.9; WALK_END = 5.8;\n  // bargain beats\n  HAGGLE0 = 5.8; HAGGLE1 = 7.1;\n  TOSS0 = 7.1; TOSS1 = 7.8;\n  NOD0 = 7.8; NOD1 = 8.4;\n  HAND0 = 8.4; HAND1 = 9.4;\n  TIP0 = 9.4; TIP1 = 10.6;\n  LEAVE0 = 10.6; LEAVE1 = 11.5;\n  SALOON_LEFT = 146;\n  // screen anchors (after camera stop)\n  HERO_X = 190; SHOP_X = 209; COUNTER_Y = 74;\n\n  // ---- low-level draw helpers ----\n  R = (g,x,y,w,h,c) => { g.fillStyle = c; g.fillRect(Math.round(x), Math.round(y), Math.max(1,Math.round(w)), Math.max(1,Math.round(h))); };\n  line = (g,x0,y0,x1,y1,w,c) => {\n    x0=Math.round(x0);y0=Math.round(y0);x1=Math.round(x1);y1=Math.round(y1);\n    const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1; let err=dx-dy;\n    const o=Math.floor(w/2); g.fillStyle=c;\n    for(;;){ g.fillRect(x0-o,y0-o,w,w); if(x0===x1&&y0===y1)break; const e2=2*err; if(e2>-dy){err-=dy;x0+=sx;} if(e2<dx){err+=dx;y0+=sy;} }\n  };\n  circleFill = (g,cx,cy,r,c) => { g.fillStyle=c; for(let y=-r;y<=r;y++){ const xx=Math.floor(Math.sqrt(Math.max(0,r*r-y*y))); g.fillRect(Math.round(cx-xx),Math.round(cy+y),xx*2+1,1); } };\n  lerp = (a,b,f)=>a+(b-a)*f;\n  lerp3 = (a,b,f)=> 'rgb('+Math.round(a[0]+(b[0]-a[0])*f)+','+Math.round(a[1]+(b[1]-a[1])*f)+','+Math.round(a[2]+(b[2]-a[2])*f)+')';\n  clamp = (v,a,b)=>v<a?a:(v>b?b:v);\n  hash = (n)=>{ n=n>>>0; n=(n^61)^(n>>>16); n=(n+(n<<3))>>>0; n=n^(n>>>4); n=Math.imul(n,0x27d4eb2d)>>>0; n=n^(n>>>15); return n>>>0; };\n  ease = (u)=>u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2;\n\n  // ---- tiny 3x5 pixel font ----\n  FONT = {\n    'S':[0b111,0b100,0b111,0b001,0b111],\n    'A':[0b111,0b101,0b111,0b101,0b101],\n    'L':[0b100,0b100,0b100,0b100,0b111],\n    'O':[0b111,0b101,0b101,0b101,0b111],\n    'N':[0b101,0b111,0b111,0b101,0b101],\n    'G':[0b111,0b100,0b101,0b101,0b111],\n    'D':[0b110,0b101,0b101,0b101,0b110],\n    'E':[0b111,0b100,0b111,0b100,0b111],\n    'W':[0b101,0b101,0b101,0b111,0b101],\n    'R':[0b110,0b101,0b110,0b101,0b101],\n    'T':[0b111,0b010,0b010,0b010,0b010],\n    'H':[0b101,0b101,0b111,0b101,0b101],\n    'Y':[0b101,0b101,0b010,0b010,0b010],\n    'M':[0b101,0b111,0b111,0b101,0b101],\n    'P':[0b110,0b101,0b110,0b100,0b100],\n    'I':[0b111,0b010,0b010,0b010,0b111],\n    'C':[0b111,0b100,0b100,0b100,0b111],\n    'U':[0b101,0b101,0b101,0b101,0b111],\n    'B':[0b110,0b101,0b110,0b101,0b110],\n    'K':[0b101,0b101,0b110,0b101,0b101],\n    'F':[0b111,0b100,0b110,0b100,0b100],\n    ' ':[0,0,0,0,0]\n  };\n  textWidth(str){ return str.length*4-1; }\n  drawText(g,str,x,y,c){ str=(str||'').toUpperCase(); for(let i=0;i<str.length;i++){ const gl=this.FONT[str[i]]||this.FONT[' ']; for(let r=0;r<5;r++){ for(let col=0;col<3;col++){ if((gl[r]>>(2-col))&1) this.R(g,x+i*4+col,y+r,1,1,c); } } } }\n\n  // ---- mood palettes ----\n  palette(){\n    const m=(this.props&&this.props.mood)||'dawn';\n    if(m==='dusk') return {top:[60,72,116],hor:[255,142,84],sunX:288,sunY:this.HOR-7,sunWarm:'#ff7a3a',sunCore:'#ffd9a0',ground:[180,118,72]};\n    if(m==='noon') return {top:[118,168,202],hor:[206,224,232],sunX:250,sunY:18,sunWarm:'#fff0c0',sunCore:'#ffffff',ground:[200,176,104]};\n    return {top:[108,150,180],hor:[255,210,152],sunX:288,sunY:this.HOR-9,sunWarm:'#ffb463',sunCore:'#fff5cc',ground:[200,174,102]};\n  }\n\n  // ---- camera / motion ----\n  cam(t){ const {RIDE_END,DECEL,SPEED}=this; if(t<=RIDE_END) return SPEED*t; const dt=DECEL-RIDE_END; if(t>=DECEL) return SPEED*RIDE_END+SPEED*dt*0.5; const u=(t-RIDE_END)/dt; return SPEED*RIDE_END+SPEED*dt*(u-u*u/2); }\n  moveSpeed(t){ const {RIDE_END,DECEL,SPEED}=this; if(t<=RIDE_END) return SPEED; if(t>=DECEL) return 0; const u=(t-RIDE_END)/(DECEL-RIDE_END); return SPEED*(1-u); }\n\n  // ---- background ----\n  drawSky(g){ const P=this._pal; for(let y=0;y<this.HOR;y++){ const f=y/this.HOR; this.R(g,0,y,this.W,1,this.lerp3(P.top,P.hor,f)); } }\n  drawSun(g){ const P=this._pal; const sx=P.sunX, sy=P.sunY; g.save(); g.globalCompositeOperation='lighter'; for(let r=24;r>0;r-=3){ g.globalAlpha=0.045; this.circleFill(g,sx,sy,r,P.sunWarm); } g.restore(); this.circleFill(g,sx,sy,7,'#ffe7a4'); this.circleFill(g,sx,sy,5,P.sunCore); }\n  drawClouds(g,t){ const off=t*4; const ys=[9,19,15], xs=[40,170,265]; for(let i=0;i<3;i++){ let X=((xs[i]-off)%(this.W+90)); if(X<-90)X+=this.W+90; const Y=ys[i]; g.globalAlpha=0.85; this.R(g,X,Y,18,4,'#ffe7ca'); this.R(g,X+4,Y-3,12,4,'#fff1dd'); this.R(g,X-3,Y+1,8,3,'#f2d6b6'); g.globalAlpha=1; } }\n  drawBirds(g,t){ for(let i=0;i<2;i++){ const speed=7+i*2; let X=(this.W+15-((t*speed+i*130)%(this.W+40))); const Y=13+i*8+Math.sin(t*0.6+i)*2; const flap=Math.sin(t*6+i*2)>0?1:0; this.R(g,X,Y,1,1,'#536069'); this.R(g,X-2,Y-flap,2,1,'#536069'); this.R(g,X+1,Y-flap,2,1,'#536069'); } }\n  drawMountains(g,t){ const cam=this.cam(t);\n    for(let x=0;x<this.W;x++){ const w=x+cam*0.10; const top=this.HOR-(6+5*Math.sin(w*0.045)+3*Math.sin(w*0.11+2)); this.R(g,x,top,1,this.HOR-top+1,'#8a96ae'); }\n    for(let x=0;x<this.W;x++){ const w=x+cam*0.18+50; const top=this.HOR-(3+6*Math.sin(w*0.05+1)+2*Math.sin(w*0.14)); this.R(g,x,top,1,this.HOR-top+1,'#6d7b99'); }\n  }\n  drawHills(g,t){ const cam=this.cam(t);\n    for(let x=0;x<this.W;x++){ const w=x+cam*0.45; const top=this.HOR-(1+4*Math.sin(w*0.06)+2*Math.sin(w*0.15+3)); this.R(g,x,top,1,this.HOR-top+2,'#92a056'); }\n    for(let x=0;x<this.W;x++){ const w=x+cam*0.62+30; const top=this.HOR+1-3*Math.max(0,Math.sin(w*0.05)); this.R(g,x,top,1,this.HOR-top+3,'#a6b063'); }\n  }\n  drawGround(g,t){ const cam=this.cam(t); const P=this._pal;\n    this.R(g,0,this.HOR,this.W,this.H-this.HOR,'rgb('+P.ground[0]+','+P.ground[1]+','+P.ground[2]+')');\n    this.R(g,0,this.HOR,this.W,3,'#b7a85f');\n    this.R(g,0,this.HOR+3,this.W,4,'#c2a85f');\n    const cm=Math.floor(cam*0.5);\n    for(let x=0;x<this.W;x++){ const w=x+cm; const hsh=this.hash(w); if(hsh%5===0){ const bh=1+(hsh>>3)%2; this.R(g,x,this.HOR+6-bh,1,bh+1,'#9a8c4a'); } }\n    this.R(g,0,71,this.W,this.H-71,'#bca05b');\n    this.R(g,0,71,this.W,2,'#ccb068');\n    const cf=Math.floor(cam);\n    for(let x=0;x<this.W;x++){ const w=x+cf; const hsh=this.hash(w*3+7); if(hsh%4===0){ const bh=2+(hsh>>4)%3; const yy=80+((hsh>>2)%7); this.R(g,x,yy-bh,1,bh,'#8e7c3d'); if(hsh%9===0) this.R(g,x,yy-bh-1,1,1,'#dac98a'); } }\n  }\n  drawScatter(g,t){ const cam=this.cam(t); const base=Math.floor(cam/60)*60;\n    for(let i=-1;i<8;i++){ const wx=base+i*60; const h=this.hash(wx+131); const jit=(h%34)-17; const X=wx+jit-cam; if(X<-18||X>this.W+12)continue;\n      // keep scatter clear of the saloon footprint\n      if(t>=this.DECEL && X>150 && X<255) continue;\n      const type=h%3; const gy=89;\n      if(type===0){ this.R(g,X-3,gy-4,7,4,'#7c8843'); this.R(g,X-1,gy-6,4,3,'#8a974f'); this.R(g,X+1,gy-3,3,3,'#6d783b'); }\n      else if(type===1){ this.R(g,X-3,gy-3,7,3,'#9a8f78'); this.R(g,X-2,gy-5,4,2,'#aaa089'); this.R(g,X+1,gy-2,2,2,'#7c725d'); }\n      else { this.R(g,X-2,gy-5,4,5,'#b49954'); this.R(g,X,gy-7,2,3,'#c8ac62'); }\n    }\n  }\n\n  // ---- saloon / trading post (scrolls into view, then stops) ----\n  drawSaloon(g,t){\n    const cam=this.cam(t); const camStop=this.cam(this.DECEL);\n    const bx=this.SALOON_LEFT+(camStop-cam); const gy=86;\n    const BW=104;\n    // ground shadow\n    g.globalAlpha=0.18; this.R(g,bx+2,gy-1,BW-2,3,'#3a2c18'); g.globalAlpha=1;\n    // boardwalk / porch floor\n    this.R(g,bx-4,82,BW+10,4,'#7a5f3c');\n    this.R(g,bx-4,82,BW+10,1,'#8d6f47');\n    for(let x=bx-4;x<bx+BW+6;x+=5){ this.R(g,x,82,1,4,'#5e4730'); }\n    // facade wall (warm planks)\n    this.R(g,bx+6,42,BW-12,42,'#a9774a');\n    for(let y=42;y<82;y+=3){ this.R(g,bx+6,y,BW-12,1,'#9a6b42'); }\n    this.R(g,bx+6,42,1,42,'#7c5634'); this.R(g,bx+BW-7,42,1,42,'#7c5634');\n    // false front (taller stepped parapet)\n    this.R(g,bx+10,30,BW-20,12,'#b07f51');\n    this.R(g,bx+10,30,BW-20,2,'#c08c5a');\n    this.R(g,bx+24,26,BW-48,4,'#b07f51');\n    this.R(g,bx+24,26,BW-48,2,'#c08c5a');\n    this.R(g,bx+10,40,BW-20,2,'#7c5634');\n    // sign board\n    const sign=((this.props&&this.props.signText)||'SALOON');\n    const sw=this.textWidth(sign); const sgx=Math.round(bx+BW/2-sw/2); const sgy=33;\n    this.R(g,sgx-3,sgy-2,sw+6,9,'#5a3d26');\n    this.R(g,sgx-3,sgy-2,sw+6,1,'#6e4d31');\n    this.drawText(g,sign,sgx,sgy,'#f2dca6');\n    // porch roof + posts\n    this.R(g,bx-4,52,BW+10,3,'#6b4a30');\n    this.R(g,bx-4,52,BW+10,1,'#7e5837');\n    this.R(g,bx-2,55,2,27,'#5e4326'); this.R(g,bx+BW-2,55,2,27,'#5e4326');\n    this.R(g,bx+40,55,2,27,'#5e4326');\n    // batwing doors (left bay)\n    const dx=bx+16;\n    this.R(g,dx,60,16,22,'#3a2a1a');\n    this.R(g,dx+1,62,6,14,'#5a4630'); this.R(g,dx+9,62,6,14,'#5a4630');\n    this.R(g,dx+7,60,2,22,'#2e2014');\n    this.R(g,dx+1,66,14,2,'#46341f');\n    // window with goods (right bay) — counter service window\n    const wx=bx+54, wy=58, ww=24, wh=18;\n    this.R(g,wx-2,wy-2,ww+4,wh+4,'#4a3420');\n    this.R(g,wx,wy,ww,wh,'#2a2018');\n    // shelves of goods behind counter\n    const goods=['#c0503f','#7c8843','#caa46a','#5a7d9a','#d9b24a','#9a5a3a'];\n    for(let r=0;r<2;r++){ const sy2=wy+2+r*6; this.R(g,wx,sy2+4,ww,1,'#5e4630'); for(let i=0;i<5;i++){ const gx=wx+2+i*4; const hh=2+((this.hash(r*7+i+3))%3); this.R(g,gx,sy2+4-hh,3,hh,goods[(i+r*2)%goods.length]); } }\n    // counter board (sill) in front of window\n    this.R(g,wx-3,this.COUNTER_Y,ww+8,3,'#8a5f38');\n    this.R(g,wx-3,this.COUNTER_Y,ww+8,1,'#a0764a');\n    this.R(g,wx-3,this.COUNTER_Y+3,ww+8,5,'#6b4a30');\n    // little hanging shingle \"GOODS\"\n    const sh='GOODS'; const shw=this.textWidth(sh); const shx=Math.round(wx+ww/2-shw/2);\n    this.R(g,shx-2,wy-9,shw+4,7,'#3f2c1a');\n    this.drawText(g,sh,shx,wy-8,'#e9c97a');\n    this.line(g,shx+2,wy-9,shx+2,wy-11,1,'#2e2014'); this.line(g,shx+shw-2,wy-9,shx+shw-2,wy-11,1,'#2e2014');\n    // barrel + crate on porch\n    this.R(g,bx+1,73,7,9,'#7c5634'); this.R(g,bx+1,73,7,1,'#9a6b42'); this.R(g,bx+1,76,7,1,'#5e4326'); this.R(g,bx+1,79,7,1,'#5e4326');\n    this.R(g,bx+BW-9,76,7,6,'#9a7e46'); this.R(g,bx+BW-9,76,7,1,'#b09455'); this.R(g,bx+BW-9,78,7,1,'#7c6238');\n    // hitching rail (left of porch, near horse)\n    const rx=bx-22; this.R(g,rx,76,1,8,'#5e4326'); this.R(g,rx+18,76,1,8,'#5e4326'); this.R(g,rx,76,19,2,'#6f5636'); this.R(g,rx,76,19,1,'#7e6440');\n    this._shopVisible = bx; // store base for shopkeeper screen pos
